apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal-app
  namespace: bincom-drupal
  labels:
    app: drupal
  # Scales out to multiple pods across your cluster node group
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drupal
  template:
    metadata:
      labels:
        app: drupal
    spec:
      containers:
      - name: drupal
        image: solomonlib/bincom-drupal:v1 # Replace with your pushed image tag
        ports:
        - name: http
          containerPort: 80
        env:
        - name: DRUPAL_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_DB_HOST
        - name: DRUPAL_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_DB_PORT
        - name: DRUPAL_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_DB_NAME
        - name: DRUPAL_DB_USER
          valueFrom:
            configMapKeyRef:
              name: drupal-config
              key: DRUPAL_DB_USER
        - name: DRUPAL_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: drupal-secrets
              key: DRUPAL_DB_PASSWORD
        - name: DRUPAL_HASH_SALT
          valueFrom:
            secretKeyRef:
              name: drupal-secrets
              key: DRUPAL_HASH_SALT
        # Using the explicit health check path that worked on this ALB setup
        readinessProbe:
          httpGet:
            path: /core/misc/drupal.js
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /core/misc/drupal.js
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 20
